global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: job-service
    metrics_path: /metrics
    static_configs:
      - targets: ["job-service:8000"]

  - job_name: metadata-service
    metrics_path: /metrics
    static_configs:
      - targets: ["metadata-service:8000"]

  - job_name: log-service
    metrics_path: /metrics
    static_configs:
      - targets: ["log-service:8000"]

  - job_name: storage-service
    metrics_path: /metrics
    static_configs:
      - targets: ["storage-service:8000"]

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets: ["loki:3100"]

  - job_name: blackbox_http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://job-service:8000/health
          - http://metadata-service:8000/health
          - http://log-service:8000/health
          - http://storage-service:8000/health
          - http://loki:3100/ready
          - http://minio:9000/minio/health/live
          - http://grafana:3000/api/health
          - http://prometheus:9090/-/healthy
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: target
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: blackbox_tcp
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - kafka:9092
          - zookeeper:2181
          - postgres:5432
          - redis:6379
          - minio:9000
          - loki:3100
          - grafana:3000
          - job-service:8000
          - metadata-service:8000
          - log-service:8000
          - storage-service:8000
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: target
      - target_label: __address__
        replacement: blackbox-exporter:9115
