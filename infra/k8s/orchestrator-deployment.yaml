# =============================================
# Orchestrator — Kubernetes Deployment
# =============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: lakehouse-platform
  labels:
    app: orchestrator
    app.kubernetes.io/part-of: lakehouse-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      serviceAccountName: orchestrator-sa
      containers:
        - name: orchestrator
          image: registry.internal/lakehouse/orchestrator:latest
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          envFrom:
            - secretRef:
                name: lakehouse-secrets
            - configMapRef:
                name: lakehouse-config
          env:
            - name: K8S_IN_CLUSTER
              value: "true"
---
# =============================================
# Service Account for Orchestrator
# (Needs permissions to create Jobs in lakehouse-jobs namespace)
# =============================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestrator-sa
  namespace: lakehouse-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-job-manager
  namespace: lakehouse-jobs
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orchestrator-spark-job-manager
  namespace: lakehouse-jobs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spark-job-manager
subjects:
  - kind: ServiceAccount
    name: orchestrator-sa
    namespace: lakehouse-platform
---
# =============================================
# Service Account for Spark Runners
# =============================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark-runner
  namespace: lakehouse-jobs

