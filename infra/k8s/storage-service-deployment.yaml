# =============================================
# Storage Service — Kubernetes Deployment
# =============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-service
  namespace: lakehouse-platform
  labels:
    app: storage-service
    app.kubernetes.io/part-of: lakehouse-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: storage-service
  template:
    metadata:
      labels:
        app: storage-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: storage-service
          image: registry.internal/lakehouse/storage-service:latest
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          envFrom:
            - secretRef:
                name: lakehouse-secrets
            - configMapRef:
                name: lakehouse-config
---
apiVersion: v1
kind: Service
metadata:
  name: storage-service
  namespace: lakehouse-platform
spec:
  selector:
    app: storage-service
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP

