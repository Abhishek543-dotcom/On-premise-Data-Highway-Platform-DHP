# =============================================
# Fluent Bit ConfigMap for Spark Containers
# =============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: lakehouse-jobs
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush           1
        Log_Level       info
        Daemon          Off
        Parsers_File    /fluent-bit/etc/parsers.conf

    [INPUT]
        Name            tail
        Tag             spark.job
        Path            /var/log/spark/*.log
        Refresh_Interval 2
        Read_from_Head  True
        DB              /tmp/flb_tail.db
        Exit_On_Eof     True

    [FILTER]
        Name            modify
        Match           *
        Add             job_id ${JOB_ID}
        Add             container_id ${HOSTNAME}
        Add             source driver

    [OUTPUT]
        Name            loki
        Match           *
        Host            host.docker.internal
        Port            3100
        Labels          job_id=${JOB_ID},source=driver,container_id=${HOSTNAME}
        Line_Format     json
        Retry_Limit     5

    [OUTPUT]
        Name            stdout
        Match           *
        Format          json_lines

  parsers.conf: |
    [PARSER]
        Name         spark_log
        Format       regex
        Regex        ^\[(?<timestamp>[^\]]+)\] \[(?<level>[^\]]+)\] (?<message>.*)$
        Time_Key     timestamp
        Time_Format  %Y-%m-%dT%H:%M:%SZ

