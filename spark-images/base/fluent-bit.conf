# ============================================
# Fluent Bit Configuration for Spark Log Shipping
# ============================================
# Ships Spark job logs to Kafka, tagged with job_id
# for per-job log isolation and retrieval.
# ============================================

[SERVICE]
    Flush           1
    Log_Level       info
    Daemon          Off
    Parsers_File    /etc/fluent-bit/parsers.conf

[INPUT]
    Name            tail
    Tag             spark.job
    Path            /var/log/spark/*.log
    Refresh_Interval 2
    Read_from_Head  True
    DB              /var/log/spark/flb_tail.db

[FILTER]
    Name            modify
    Match           *
    Add             job_id ${JOB_ID}
    Add             container_id ${HOSTNAME}
    Add             source driver

[FILTER]
    Name            parser
    Match           *
    Key_Name        log
    Parser          spark_log
    Reserve_Data    On

[OUTPUT]
    Name            kafka
    Match           *
    Brokers         ${KAFKA_BROKERS}
    Topics          spark-job-logs
    Format          json
    Timestamp_Key   @timestamp
    Retry_Limit     5

# Fallback: also write to stdout for debugging
[OUTPUT]
    Name            stdout
    Match           *
    Format          json_lines

