site_name: DataHarbour Project (DHP)
site_description: An API-first, on-premise data lakehouse platform for running Spark jobs with operational controls
site_url: https://abhishektiwari.github.io/On-premise-Data-Highway-Platform-DHP/
repo_url: https://github.com/abhishektiwari/On-premise-Data-Highway-Platform-DHP
repo_name: On-premise-Data-Highway-Platform-DHP
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Prerequisites: getting-started/prerequisites.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - Architecture:
    - Overview: architecture/overview.md
    - Services: architecture/services.md
    - Data Flow: architecture/data-flow.md
  - Services:
    - Job Service: services/job-service.md
    - Metadata Service: services/metadata-service.md
    - Log Service: services/log-service.md
    - Storage Service: services/storage-service.md
    - Orchestrator: services/orchestrator.md
  - Spark Runtime:
    - Runtime Environment: spark/runtime.md
    - Writing Jobs: spark/writing-jobs.md
  - Infrastructure:
    - Docker Compose: infrastructure/docker-compose.md
    - Kubernetes: infrastructure/kubernetes.md
    - Monitoring: infrastructure/monitoring.md
  - Operations:
    - Runbook: operations/runbook.md
    - Troubleshooting: operations/troubleshooting.md
  - API Reference: api-reference.md
  - Contributing: contributing.md
